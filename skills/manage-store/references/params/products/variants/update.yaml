# Variant Update

id:
  type: integer
  min: 1
  required: true

name:
  type: string
  nullable: true
  maxLength: 255

description:
  type: string
  nullable: true

price:
  type: integer
  nullable: true
  min: 0

inventoryItemId:
  type: integer
  nullable: true
  min: 1
  description: Prohibited for gift card products

options:
  type: object
  nullable: true
  description: Prohibited for gift card products. Create only existing option type names on the product. Update option IDs must belong to this variant
  properties:
    create:
      type: array
      maxItems: 3
      items:
        name:
          type: string
          maxLength: 255
          required: true
        value:
          type: string
          required: true
    update:
      type: array
      items:
        id:
          type: integer
          min: 1
          required: true
        value:
          type: string
          required: true
