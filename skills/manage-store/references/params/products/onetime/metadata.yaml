# One-Time Product Metadata

id:
  type: integer
  min: 1
  required: true

metadata:
  type: object
  required: true
  properties:
    create:
      type: array
      nullable: true
      items:
        name:
          type: string
          maxLength: 255
          required: true
        description:
          type: string
          nullable: true
          maxLength: 1000
        values:
          type: array
          minItems: 1
          required: true
    delete:
      type: array
      nullable: true
      items:
        attributeId:
          type: integer
          min: 1
          required: true
        values:
          type: array
          nullable: true
          items:
            type: integer
            min: 1
