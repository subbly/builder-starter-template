# Product Plan Update

id:
  type: integer
  min: 1
  required: true

name:
  type: string
  nullable: true
  maxLength: 255

price:
  type: integer
  min: 0
  description: Prohibited when the plan has active subscriptions

cutOffDays:
  type: integer
  nullable: true
  min: 0
  description: Number of days before the first shipment date that acts as a preparation deadline. For adhoc plans with anchored shipping, shipments within the cutoff window are rolled forward individually. For anchored billing, if a subscriber signs up after the cutoff, the entire billing cycle defers. Required for anchored billing plans

cutOffTime:
  type: string
  nullable: true
  pattern: ^(?:[01]\d|2[0-3]):[0-5]\d$
  description: Time-of-day deadline for the cutoff (HH:MM format). Defaults to 23:59 on the server if cutOffDays is set but cutOffTime is omitted. Prohibited for digital products

chargeImmediately:
  type: integer
  enum: [0, 1]
  description: Whether to charge the subscriber on signup (1) or defer to the next billing date (0). Forced to 1 for adhoc plans. Prohibited for digital products

shipImmediately:
  type: integer
  enum: [0, 1]
  description: Whether to ship immediately on signup (1) or wait for the next scheduled shipment (0). Cannot be 1 when chargeImmediately is 0

bufferDays:
  type: integer
  nullable: true
  min: 0
  description: Number of days after signup before the first shipment is dispatched. Only allowed when shipImmediately is true. Prohibited for digital products

trialPrice:
  type: integer
  nullable: true
  min: 0
  description: Price for the trial period. Prohibited for anchored billing plans and plans with an active pre-order

trialLengthDays:
  type: integer
  nullable: true
  min: 0
  description: Duration of the trial period in days. Prohibited for anchored billing plans and plans with an active pre-order

trialSingleOrder:
  type: integer
  enum: [0, 1]
  description: Whether the trial is a single order (1) or a recurring trial (0). Only available for adhoc physical plans. Prohibited for digital products and anchored billing

commitmentBillingCount:
  type: integer
  nullable: true
  min: 1
  description: Minimum number of billing cycles a subscriber must complete before cancellation is allowed. Not applied to gift subscriptions

chargesLimit:
  type: integer
  nullable: true
  min: 1
  description: Maximum number of successful charges before the subscription is automatically expired. Once paid invoice count reaches this limit, the subscription expires after the next payment

shipmentSchedule:
  type: array
  description: Ordered list of shipment dates within each billing cycle. Required for physical products, prohibited for digital. All entries must use the same format
  items:
    addUnit:
      type: string
      nullable: true
      enum: [day, week, month]
      description: Buffered format: time unit to offset shipment from billing start. Mutually exclusive with unitDay/unitOffset. Only available for adhoc billing
    addCount:
      type: integer
      nullable: true
      description: Buffered format: number of addUnit intervals to offset from billing start. Use -1 to ship the day before the next billing cycle. Mutually exclusive with unitDay/unitOffset
    unitDay:
      type: integer
      nullable: true
      description: Anchored format: day within the frequency unit to ship on (1-31 for monthly, 1-7 ISO for weekly). Mutually exclusive with addUnit/addCount. Required for anchored billing or adhoc with anchored shipping
    unitOffset:
      type: integer
      nullable: true
      description: Anchored format: which iteration within the billing period this shipment belongs to (0 to frequencyCount-1). Mutually exclusive with addUnit/addCount

surveyId:
  type: integer
  nullable: true
  min: 1
