# Products List

page:
  type: integer
  min: 0

perPage:
  type: integer
  min: 1
  max: 100

type:
  type: string
  enum: [one_time, subscription]

ids:
  type: array
  items:
    type: integer
    min: 1

tags:
  type: array
  items:
    type: string

slugs:
  type: array
  items:
    type: string

published:
  type: integer
  enum: [0, 1]

digital:
  type: integer
  enum: [0, 1]

giftCard:
  type: integer
  enum: [0, 1]

expand:
  type: array
  items:
    type: string
  description: "Relations to expand: variants, plans, bundle"

sort:
  type: object
  properties:
    field:
      type: string
      enum: [id, name]
      required: true
      description: "id = creation order, name = alphabetical"
    direction:
      type: string
      enum: [asc, desc]
      required: true
